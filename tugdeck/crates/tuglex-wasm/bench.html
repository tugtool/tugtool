<!DOCTYPE html>
<html>
<head><title>tuglex-wasm benchmark</title></head>
<body>
<h1>tuglex-wasm benchmark</h1>
<pre id="output">Loading WASM...</pre>
<script type="module">
import init, { lex_blocks, parse_to_html, lex_and_parse } from './pkg/tuglex_wasm.js';

const out = document.getElementById('output');
function log(msg) { out.textContent += msg + '\n'; console.log(msg); }

// Generate test content (same pattern as gallery card)
function generateMarkdown(targetBytes) {
  const UNIT = `## Section Heading

This is a paragraph of realistic prose content. It discusses the implementation details of a virtualized rendering engine. The engine uses a BlockHeightIndex data structure backed by a Float64Array prefix sum to achieve O(log n) scroll offset lookups. This paragraph is roughly 300 characters long including spaces and punctuation, which is typical for real conversation content.

Another paragraph follows immediately. It continues the discussion of the sliding window algorithm.

### Code Example

\`\`\`typescript
class BlockHeightIndex {
  private heights: Float64Array;
  private prefixSum: Float64Array;
  constructor(initialCapacity = 1024) {
    this.heights = new Float64Array(initialCapacity);
    this.prefixSum = new Float64Array(initialCapacity + 1);
  }
}
\`\`\`

### List of Features

- Virtualized rendering: only viewport-visible blocks are in the DOM
- Float64Array prefix sum for O(log n) offset lookups
- Lazy recomputation from the dirty watermark forward
- Binary search for scroll offset to block index mapping

> **Note:** The height estimation uses hardcoded constants per block type.

---

`;
  const unitLen = UNIT.length;
  const repeats = Math.ceil(targetBytes / unitLen);
  let result = '# Virtualized Markdown Rendering Engine\n\n';
  for (let i = 0; i < repeats; i++) {
    result += UNIT.replace('## Section Heading', `## Section ${i + 1}`);
  }
  return result;
}

await init();
log('WASM loaded.\n');

log('=== LEX ONLY ===');
for (const sizeKB of [1, 10, 100, 1000, 10000]) {
  const text = generateMarkdown(sizeKB * 1024);
  const t0 = performance.now();
  const json = lex_blocks(text);
  const t1 = performance.now();
  const blocks = JSON.parse(json);
  log(`${(sizeKB + 'KB').padStart(7)}: lex=${(t1-t0).toFixed(1)}ms, ${blocks.length} blocks`);
}

log('\n=== PARSE SINGLE BLOCK ===');
const sampleBlock = '## Heading\n\nA paragraph with **bold** and `code` and [a link](http://example.com).\n\n- item one\n- item two\n- item three\n';
for (let i = 0; i < 3; i++) {
  const t0 = performance.now();
  const html = parse_to_html(sampleBlock);
  const t1 = performance.now();
  log(`  run ${i+1}: parse=${(t1-t0).toFixed(2)}ms, html=${html.length} chars`);
}

log('\n=== LEX + PARSE ALL BLOCKS (full pipeline) ===');
for (const sizeKB of [1, 10, 100, 1000, 10000]) {
  const text = generateMarkdown(sizeKB * 1024);
  const t0 = performance.now();
  const json = lex_and_parse(text);
  const t1 = performance.now();
  const result = JSON.parse(json);
  const t2 = performance.now();
  log(`${(sizeKB + 'KB').padStart(7)}: lex+parse=${(t1-t0).toFixed(1)}ms, JSON=${(t2-t1).toFixed(1)}ms, ${result.blocks.length} blocks, ${result.html.reduce((s,h) => s+h.length, 0)} html chars`);
}

log('\nDone.');
</script>
</body>
</html>
