<!DOCTYPE html>
<html>
<head><title>tugmark-wasm transport benchmark</title></head>
<body>
<h1>tugmark-wasm: JSON vs packed binary transport</h1>
<pre id="output">Loading WASM...</pre>
<script type="module">
import init, { lex_blocks, lex_blocks_json, parse_to_html } from './pkg/tugmark_wasm.js';

const out = document.getElementById('output');
function log(msg) { out.textContent += msg + '\n'; console.log(msg); }

const STRIDE = 4;
const TYPE_NAMES = ['?','heading','paragraph','code','blockquote','list','table','hr','html','other'];

function decodeBlocks(buf) {
  const count = buf.length / STRIDE;
  const blocks = new Array(count);
  for (let i = 0, j = 0; i < buf.length; i += STRIDE, j++) {
    const w0 = buf[i];
    blocks[j] = {
      type:      TYPE_NAMES[w0 & 0xFF],
      depth:     (w0 >> 8) & 0xFF,
      start:     buf[i + 1],
      end:       buf[i + 2],
      itemCount: buf[i + 3] & 0xFFFF,
      rowCount:  (buf[i + 3] >> 16) & 0xFFFF,
    };
  }
  return blocks;
}

function generateMarkdown(targetBytes) {
  const UNIT = `## Section Heading

This is a paragraph of realistic prose content. It discusses the implementation details of a virtualized rendering engine. The engine uses a BlockHeightIndex data structure backed by a Float64Array prefix sum to achieve O(log n) scroll offset lookups.

Another paragraph follows immediately. It continues the discussion of the sliding window algorithm.

### Code Example

\`\`\`typescript
class BlockHeightIndex {
  private heights: Float64Array;
  private prefixSum: Float64Array;
  constructor(initialCapacity = 1024) {
    this.heights = new Float64Array(initialCapacity);
    this.prefixSum = new Float64Array(initialCapacity + 1);
  }
}
\`\`\`

### List of Features

- Virtualized rendering: only viewport-visible blocks are in the DOM
- Float64Array prefix sum for O(log n) offset lookups
- Lazy recomputation from the dirty watermark forward
- Binary search for scroll offset to block index mapping

> **Note:** The height estimation uses hardcoded constants per block type.

---

`;
  const unitLen = UNIT.length;
  const repeats = Math.ceil(targetBytes / unitLen);
  let result = '# Virtualized Markdown Rendering Engine\n\n';
  for (let i = 0; i < repeats; i++) {
    result += UNIT.replace('## Section Heading', `## Section ${i + 1}`);
  }
  return result;
}

await init();
log('WASM loaded.\n');

log('=== LEX TRANSPORT: JSON vs PACKED BINARY ===');
log('');

for (const sizeKB of [1, 10, 100, 1000, 10000]) {
  const text = generateMarkdown(sizeKB * 1024);
  const label = (sizeKB + 'KB').padStart(7);

  // JSON path
  const j0 = performance.now();
  const jsonStr = lex_blocks_json(text);
  const j1 = performance.now();
  const jsonBlocks = JSON.parse(jsonStr);
  const j2 = performance.now();

  // Binary path
  const b0 = performance.now();
  const buf = lex_blocks(text);
  const b1 = performance.now();
  const binBlocks = decodeBlocks(buf);
  const b2 = performance.now();

  log(`${label}:  JSON ${(j2-j0).toFixed(1)}ms (wasm ${(j1-j0).toFixed(1)} + parse ${(j2-j1).toFixed(1)})  |  Binary ${(b2-b0).toFixed(1)}ms (wasm ${(b1-b0).toFixed(1)} + decode ${(b2-b1).toFixed(1)})  |  ${binBlocks.length} blocks  ${buf.byteLength} bytes`);
}

log('');
log('=== CORRECTNESS CHECK ===');
const testMd = '# Hello\n\nWorld **bold** and `code`.\n\n- one\n- two\n\n---\n';
const buf = lex_blocks(testMd);
const blocks = decodeBlocks(buf);
log(`Input: ${JSON.stringify(testMd)}`);
log(`Blocks: ${blocks.length}`);
for (const b of blocks) {
  const raw = testMd.slice(b.start, b.end);
  log(`  ${b.type.padEnd(12)} [${b.start},${b.end}) depth=${b.depth} items=${b.itemCount} rows=${b.rowCount}  raw=${JSON.stringify(raw.trim().slice(0,50))}`);
}

log('');
log('=== PARSE HTML ===');
for (const b of blocks) {
  const raw = testMd.slice(b.start, b.end);
  const html = parse_to_html(raw);
  log(`  ${b.type.padEnd(12)} → ${JSON.stringify(html.trim().slice(0,80))}`);
}

log('\nDone.');
</script>
</body>
</html>
