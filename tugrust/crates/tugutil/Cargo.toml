[package]
name = "tugutil"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Tug utility — project management, state tracking, and developer tools"

[[bin]]
name = "tugutil"
path = "src/main.rs"

[dependencies]
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
thiserror.workspace = true
anyhow.workspace = true
regex.workspace = true
dirs.workspace = true
tugutil-core.workspace = true
ureq = { version = "3", features = ["json"] }

[build-dependencies]
serde_json.workspace = true
serde = { workspace = true }

[dev-dependencies]
tempfile = "3"
serial_test = "3"
