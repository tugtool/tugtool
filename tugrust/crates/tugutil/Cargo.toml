[package]
name = "tugutil"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "tugutil — the unified Tug developer CLI (changes & commits, dashes, host plumbing)"

[[bin]]
name = "tugutil"
path = "src/main.rs"

[dependencies]
clap.workspace = true
libc.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
thiserror.workspace = true
anyhow.workspace = true
regex.workspace = true
chrono.workspace = true
tugcore.workspace = true
tugutil-core.workspace = true
tugdash-core.workspace = true
tugmark-core.workspace = true
ureq = { version = "3", features = ["json"] }

[dev-dependencies]
tempfile.workspace = true
assert_cmd.workspace = true
rusqlite.workspace = true
serial_test = "3"
