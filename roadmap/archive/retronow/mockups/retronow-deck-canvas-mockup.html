<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retronow Deck Canvas Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/retronow-components.css" />
    <link rel="stylesheet" href="../styles/retronow-deck.css" />
  </head>
  <body class="rn-app">
    <div class="rn-container">
      <div class="rn-row" style="justify-content: space-between; align-items: flex-start;">
        <div>
          <div class="rn-kicker">Retronow</div>
          <h1 class="rn-title">Card Deck on Canvas</h1>
          <p class="rn-subtitle">
            App layout concept: cards arranged on a canvas, snap-aligned like panel systems
            in creative tooling.
          </p>
        </div>
        <button id="rn-theme-toggle" class="rn-theme-switch" type="button">Theme: Harmony</button>
      </div>

      <section class="rn-canvas">
        <header class="rn-canvas-toolbar">
          <button class="rn-button">New Card</button>
          <button class="rn-button" data-variant="secondary">Layout Preset</button>
          <span class="rn-badge">Snap 24px Grid</span>
          <span class="rn-badge">Docking Enabled</span>
        </header>

        <div class="rn-deck" id="rn-deck">
          <article class="rn-card" data-size="lg" data-card style="left: 24px; top: 18px;">
            <header class="rn-card-header" data-drag-handle>
              <span>Navigator</span>
              <i data-lucide="move"></i>
            </header>
            <div class="rn-card-content rn-column">
              <label class="rn-label" for="address">Address</label>
              <div class="rn-row">
                <button class="rn-icon-btn" aria-label="Back"><i data-lucide="arrow-left"></i></button>
                <input id="address" class="rn-field" style="flex: 1;" value="retronow://deck/main" />
                <button class="rn-icon-btn" aria-label="Refresh"><i data-lucide="refresh-cw"></i></button>
              </div>
              <label class="rn-label" for="notes">Notes</label>
              <textarea id="notes" class="rn-textarea">Canvas-wide system memo.
- all cards are movable
- card footprint is intentionally fixed in this review
- drop to nearest 24px grid intersection</textarea>
            </div>
          </article>

          <article class="rn-card" data-size="md" data-card style="left: 576px; top: 18px;">
            <header class="rn-card-header" data-drag-handle>
              <span>Telemetry</span>
              <i data-lucide="activity"></i>
            </header>
            <div class="rn-card-content">
              <div class="rn-card-grid">
                <div class="rn-mini"></div>
                <div class="rn-mini"></div>
                <div class="rn-mini"></div>
                <div class="rn-mini"></div>
              </div>
            </div>
          </article>

          <article class="rn-card" data-size="sm" data-card style="left: 576px; top: 264px;">
            <header class="rn-card-header" data-drag-handle>
              <span>Deck Controls</span>
              <i data-lucide="sliders-horizontal"></i>
            </header>
            <div class="rn-card-content rn-column">
              <label class="rn-control-row">
                <input class="rn-check" type="checkbox" checked />
                <span class="rn-micro-text">Enable magnetic edges</span>
              </label>
              <label class="rn-control-row">
                <input class="rn-check" type="checkbox" checked />
                <span class="rn-micro-text">Show docking guides</span>
              </label>
              <label class="rn-label" for="zoom">Canvas Zoom</label>
              <input id="zoom" class="rn-slider" type="range" min="25" max="150" value="100" />
            </div>
          </article>

          <div class="rn-snap-preview" id="rn-snap-preview" hidden></div>
        </div>
      </section>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      const deck = document.getElementById("rn-deck");
      const themeToggle = document.getElementById("rn-theme-toggle");
      const snap = 24;
      const preview = document.getElementById("rn-snap-preview");

      let dragState = null;

      function snapValue(value) {
        return Math.round(value / snap) * snap;
      }

      function beginDrag(event, card) {
        const rect = card.getBoundingClientRect();
        const deckRect = deck.getBoundingClientRect();

        dragState = {
          card,
          startX: event.clientX,
          startY: event.clientY,
          left: rect.left - deckRect.left,
          top: rect.top - deckRect.top,
          width: rect.width,
          height: rect.height
        };

        card.setPointerCapture(event.pointerId);
        preview.hidden = false;
      }

      function onMove(event) {
        if (!dragState) return;

        const dx = event.clientX - dragState.startX;
        const dy = event.clientY - dragState.startY;

        const left = snapValue(dragState.left + dx);
        const top = snapValue(dragState.top + dy);
        preview.style.left = left + "px";
        preview.style.top = top + "px";
        preview.style.width = dragState.width + "px";
        preview.style.height = dragState.height + "px";
      }

      function endDrag(event) {
        if (!dragState) return;

        const dx = event.clientX - dragState.startX;
        const dy = event.clientY - dragState.startY;
        const card = dragState.card;

        card.style.left = snapValue(dragState.left + dx) + "px";
        card.style.top = snapValue(dragState.top + dy) + "px";

        preview.hidden = true;
        dragState = null;
        card.releasePointerCapture(event.pointerId);
      }

      deck.querySelectorAll("[data-card]").forEach((card) => {
        const dragHandle = card.querySelector("[data-drag-handle]");

        dragHandle.addEventListener("pointerdown", (event) => beginDrag(event, card));
        card.addEventListener("pointermove", onMove);
        card.addEventListener("pointerup", endDrag);
        card.addEventListener("pointercancel", endDrag);
      });
      const THEME_ORDER = ["harmony", "bluenote", "brio"];
      const THEME_LABEL = {
        harmony: "Harmony",
        bluenote: "Bluenote",
        brio: "Brio"
      };

      function normalizeTheme(value) {
        if (value === "dark") return "bluenote";
        if (value === "light") return "harmony";
        if (THEME_ORDER.includes(value)) return value;
        return "harmony";
      }

      let theme = "harmony";
      try {
        theme = normalizeTheme(window.localStorage.getItem("retronow-theme"));
      } catch (error) {
        theme = "harmony";
      }
      function applyTheme() {
        document.body.classList.remove("rn-theme-dark", "rn-theme-bluenote", "rn-theme-brio");
        if (theme === "bluenote") {
          document.body.classList.add("rn-theme-dark", "rn-theme-bluenote");
        } else if (theme === "brio") {
          document.body.classList.add("rn-theme-brio");
        }
        if (themeToggle) themeToggle.textContent = "Theme: " + THEME_LABEL[theme];
      }
      applyTheme();
      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const index = THEME_ORDER.indexOf(theme);
          theme = THEME_ORDER[(index + 1) % THEME_ORDER.length];
          applyTheme();
          try {
            window.localStorage.setItem("retronow-theme", theme);
          } catch (error) {
            /* no-op */
          }
        });
      }

      lucide.createIcons();
    </script>
  </body>
</html>
